name: Atualizar dados de voos (SIROS/ANAC)

on:
  schedule:
    # Roda 4x por dia: 06h, 09h, 12h e 18h (horario de Brasilia = UTC-3)
    # Em UTC: 09h, 12h, 15h e 21h
    - cron: '0 9,12,15,21 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Buscar dados no SIROS/ANAC
        run: python scripts/fetch_flights.py
        env:
          # API SIROS e publica — sem necessidade de credenciais!
          # Adicione quantos aeroportos quiser (sem limite de chamadas)
          AIRPORTS: ${{ vars.AIRPORTS || 'SBCA,SBGR,SBSP,SBCT,SBGL,SBBR,SBFL,SBPA,SBSV,SBFZ' }}

      - name: Commitar JSONs atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualiza dados SIROS/ANAC [skip ci]"
          file_pattern: data/*.json
